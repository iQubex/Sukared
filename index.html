<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SukaRed 1.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div>
                <h1 class="neon-title" id="mainTitle">SukaRed</h1>
                <p class="version-text" id="subTitle">1.0</p>
            </div>
            <div class="status-pill" id="statusPill" role="status" aria-live="polite">Ready</div>
        </header>

        <section class="toolbar" aria-label="Obfuscation controls">
            <div class="toolbar-actions">
                <button id="openFileBtn" class="toolbar-btn" type="button" title="Open File" aria-label="Open File">Open File</button>
                <input id="fileInput" type="file" accept=".lua,.luau,text/plain" hidden>
                <span id="fileNameLabel" class="file-label" aria-live="polite"></span>
                <button id="clearBtn" class="toolbar-btn" type="button" title="Clear" aria-label="Clear">Clear</button>
            </div>
            <div class="toolbar-status">
                <span>Build configuration is managed in Settings.</span>
            </div>
        </section>

        <main class="app-main" id="dropZone">
            <section class="editor-side left-side">
                <div class="panel-header">
                    <span>Input</span>
                </div>
                <div id="inputEditor" class="editor-host"></div>
                <textarea id="codeInput" class="editor-fallback" placeholder="-- Paste your Luau script here..."></textarea>
            </section>

            <div class="center-controls">
                <button id="settingsBtn" class="settings-button" type="button" title="Settings" aria-label="Settings">Settings</button>
                <button id="obfuscateBtn" class="play-button" aria-label="Obfuscate" title="Obfuscate">
                    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                        <polygon points="8,5 19,12 8,19" fill="currentColor"></polygon>
                    </svg>
                    <span class="spinner" aria-hidden="true"></span>
                </button>
            </div>

            <section class="editor-side right-side">
                <div class="panel-header">
                    <span>Output</span>
                    <div class="actions">
                        <button id="copyBtn" class="action-btn" type="button" title="Copy" aria-label="Copy">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button id="downloadBtn" class="action-btn" type="button" title="Download" aria-label="Download">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="outputEditor" class="editor-host"></div>
                <textarea id="codeOutput" class="editor-fallback" readonly placeholder="-- Obfuscated output will appear here..."></textarea>
            </section>
        </main>

        <section id="buildInfo" class="build-info" hidden aria-label="Build Information">
            <h2>Build Information</h2>
            <dl id="buildInfoGrid"></dl>
        </section>

        <section id="errorDetails" class="error-details" hidden>
            <button id="errorToggle" type="button" class="link-button">Details</button>
            <pre id="errorText" hidden></pre>
        </section>
    </div>

    <div id="settingsOverlay" class="modal-overlay" hidden>
        <section id="settingsModal" class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" tabindex="-1">
            <div class="modal-header">
                <div>
                    <h2 id="settingsTitle">Settings</h2>
                    <p>Build configuration affects output size and runtime cost.</p>
                </div>
                <button id="settingsCloseBtn" class="modal-close" type="button" title="Close" aria-label="Close">x</button>
            </div>

            <div class="modal-body">
                <div class="setting-row">
                    <label id="profileDropdownLabel">Profile</label>
                    <div id="profileDropdown" class="custom-dropdown" data-setting="profile" data-value="balanced">
                        <button class="dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="profileDropdownLabel">
                            <span class="dropdown-value">Balanced</span>
                            <span class="dropdown-caret" aria-hidden="true">v</span>
                        </button>
                        <div class="dropdown-menu" role="listbox" aria-labelledby="profileDropdownLabel" hidden>
                            <button type="button" role="option" data-value="light">Light</button>
                            <button type="button" role="option" data-value="balanced" aria-selected="true">Balanced</button>
                            <button type="button" role="option" data-value="strong">Strong</button>
                        </div>
                    </div>
                </div>

                <div class="setting-row">
                    <label id="vmDropdownLabel">VM Mode</label>
                    <div id="vmDropdown" class="custom-dropdown" data-setting="vmMode" data-value="off">
                        <button class="dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="vmDropdownLabel">
                            <span class="dropdown-value">Off</span>
                            <span class="dropdown-caret" aria-hidden="true">v</span>
                        </button>
                        <div class="dropdown-menu" role="listbox" aria-labelledby="vmDropdownLabel" hidden>
                            <button type="button" role="option" data-value="off" aria-selected="true">Off</button>
                            <button type="button" role="option" data-value="selected">Selected</button>
                            <button type="button" role="option" data-value="aggressive">Aggressive</button>
                        </div>
                    </div>
                </div>

                <label class="toggle-row">
                    <span>Word Wrap</span>
                    <input id="wordWrapToggle" type="checkbox" checked>
                    <span class="toggle-visual" aria-hidden="true"></span>
                </label>

                <label class="toggle-row">
                    <span>Minimap</span>
                    <input id="minimapToggle" type="checkbox">
                    <span class="toggle-visual" aria-hidden="true"></span>
                </label>

                <label class="toggle-row">
                    <span>Animation Effects</span>
                    <input id="animationsToggle" type="checkbox" checked>
                    <span class="toggle-visual" aria-hidden="true"></span>
                </label>
            </div>

            <div class="modal-actions">
                <button id="settingsCancelBtn" class="toolbar-btn" type="button">Cancel</button>
                <button id="settingsSaveBtn" class="toolbar-btn primary" type="button">Save Settings</button>
            </div>
        </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script src="script.js"></script>
</body>

</html>
