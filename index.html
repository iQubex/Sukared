<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SukaRed Obfuscator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="neon-title">SukaRed</h1>
            <p class="scramble-text" id="subTitle">Obfuscator</p>
        </header>

        <main class="app-main">
            <div class="editor-side left-side">
                <div class="panel-header">
                    <span>ORIGINAL CODE</span>
                </div>
                <textarea id="codeInput" placeholder="-- Paste your Luau script here..."></textarea>
            </div>

            <div class="center-controls">
                <button id="obfuscateBtn" class="play-button" aria-label="Obfuscate">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <polygon points="8,5 19,12 8,19" fill="currentColor"/>
                    </svg>
                </button>
            </div>

            <div class="editor-side right-side">
                <div class="panel-header">
                    <span>OBFUSCATED CODE</span>
                    <div class="actions">
                        <button id="copyBtn" class="action-btn" title="Copy to Clipboard">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button id="downloadBtn" class="action-btn" title="Download File">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <textarea id="codeOutput" readonly placeholder="-- Your obfuscated code will appear here..."></textarea>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
